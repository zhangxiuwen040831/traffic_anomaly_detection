
project_name: traffic_anomaly_detection
data_dir: data
output_dir: outputs

dataset:
  name: UNSW-NB15
  url: "https://github.com/defcom17/UNSW_NB15/raw/master/UNSW_NB15_training-set.csv"
  test_url: "https://github.com/defcom17/UNSW_NB15/raw/master/UNSW_NB15_testing-set.csv"

preprocessing:
  sample_size: 5000
  normal_label: 0
  test_size: 0.3
  random_state: 42

model:
  type: mlp_autoencoder
  hidden_dims: [64, 32, 16, 32, 64]
  activation: relu
  dropout: 0.2

training:
  batch_size: 64
  epochs: 10
  learning_rate: 0.001
  optimizer: adam
  loss: mse

evaluation:
  threshold_method: percentile
  percentile: 95

paths:
  raw_data: data/raw
  processed_data: data/processed
  logs: outputs/logs
  checkpoints: outputs/checkpoints
  figures: outputs/figures
  reports: outputs/reports
